<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Pincode Distance Calculator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f9fafb;
            --surface: #ffffff;
            --text: #111827;
            --border: #e5e7eb;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.8rem;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .results-section {
            margin-top: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f3f4f6;
            font-weight: 600;
        }

        .error {
            color: #dc2626;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bulk Pincode Distance Calculator</h1>
    <p style="text-align: center; color: #6b7280;">Enter multiple pincodes</p>
    
    <div class="grid">
        <div>
            <label for="sourcePincodes">Source Pincodes</label>
            <textarea id="sourcePincodes" placeholder="e.g., 110001, 560001"></textarea>
        </div>
        <div>
            <label for="destPincodes">Destination Pincodes</label>
            <textarea id="destPincodes" placeholder="e.g., 400001, 600001"></textarea>
        </div>
    </div>

    <button id="calculateBtn" onclick="processCalculations()">Calculate Distances</button>

    <div class="results-section">
        <h2>Results</h2>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>From</th>
                    <th>To</th>
                    <th>Distance (KM)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="resultsBody">
                <tr>
                    <td colspan="4" style="text-align: center; color: #9ca3af;">No data calculated yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
